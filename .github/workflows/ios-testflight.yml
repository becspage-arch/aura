name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  build-upload:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Install Fastlane
        run: sudo gem install fastlane -N

      - name: Build IPA (Automatic Signing)
        env:
          TEAM_ID: YA5SH43A77
        run: |
          set -euo pipefail

          cd ios/App

          ARCHIVE_PATH="$RUNNER_TEMP/Aura.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_PATH"

          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            clean archive

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"

          echo "IPA_PATH=$(ls -1 "$EXPORT_PATH"/*.ipa | head -n 1)" >> $GITHUB_ENV

      - name: Create App Store Connect API key file
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          echo "$APPSTORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

          cat > "$RUNNER_TEMP/api_key.json" <<EOF
          {
            "key_id": "$APPSTORE_CONNECT_KEY_ID",
            "issuer_id": "$APPSTORE_CONNECT_ISSUER_ID",
            "key": "$(sed ':a;N;$!ba;s/\n/\\n/g' "$RUNNER_TEMP/AuthKey.p8")",
            "in_house": false
          }
          EOF

          echo "ASC_API_KEY_PATH=$RUNNER_TEMP/api_key.json" >> $GITHUB_ENV

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          fastlane pilot upload \
            --api_key_path "$ASC_API_KEY_PATH" \
            -i "$IPA_PATH" \
            --skip_waiting_for_build_processing true