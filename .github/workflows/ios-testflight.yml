name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  build-upload:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build (web)
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Install Fastlane
        run: sudo gem install fastlane -N

      - name: Prepare signing files
        env:
          IOS_SIGNING_P12_BASE64: ${{ secrets.IOS_SIGNING_P12_BASE64 }}
          IOS_SIGNING_P12_PASSWORD: ${{ secrets.IOS_SIGNING_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          # Keychain
          KEYCHAIN="$RUNNER_TEMP/aura.keychain-db"
          KEYCHAIN_PW="temp_pw"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN"

          # Import cert (.p12)
          echo "$IOS_SIGNING_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/ios_distribution.p12"
          security import "$RUNNER_TEMP/ios_distribution.p12" -k "$KEYCHAIN" -P "$IOS_SIGNING_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

          # Install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          # Extract UUID + Name from the provisioning profile
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")

          cp "$RUNNER_TEMP/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$NAME" >> $GITHUB_ENV

      - name: Build IPA
        env:
          TEAM_ID: YA5SH43A77
        run: |
          set -euo pipefail

          cd ios/App

          ARCHIVE_PATH="$RUNNER_TEMP/Aura.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_PATH"

          cat > "$RUNNER_TEMP/exportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>net.tradeaura.app</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            clean archive

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"

          ls -la "$EXPORT_PATH"
          echo "IPA_PATH=$(ls -1 "$EXPORT_PATH"/*.ipa | head -n 1)" >> $GITHUB_ENV

      - name: Create App Store Connect API key file
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          echo "$APPSTORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

          cat > "$RUNNER_TEMP/api_key.json" <<EOF
          {
            "key_id": "$APPSTORE_CONNECT_KEY_ID",
            "issuer_id": "$APPSTORE_CONNECT_ISSUER_ID",
            "key": "$(sed ':a;N;$!ba;s/\n/\\n/g' "$RUNNER_TEMP/AuthKey.p8")",
            "in_house": false
          }
          EOF

          echo "ASC_API_KEY_PATH=$RUNNER_TEMP/api_key.json" >> $GITHUB_ENV

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          fastlane pilot upload --api_key_path "$ASC_API_KEY_PATH" -i "$IPA_PATH" --skip_waiting_for_build_processing true
          