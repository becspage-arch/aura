name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  build-upload:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: npm run build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Install Fastlane
        run: sudo gem install fastlane -N

      - name: Install Signing Assets
        env:
          IOS_SIGNING_P12_BASE64: ${{ secrets.IOS_SIGNING_P12_BASE64 }}
          IOS_SIGNING_P12_PASSWORD: ${{ secrets.IOS_SIGNING_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -e

          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="ci_password"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"

          echo "$IOS_SIGNING_P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$IOS_SIGNING_P12_PASSWORD" -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

      - name: Build IPA
        env:
          TEAM_ID: YA5SH43A77
        run: |
          set -e
          cd ios/App

          ARCHIVE_PATH="$RUNNER_TEMP/App.xcarchive"
          EXPORT_PATH="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_PATH"

          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>

            <key>signingStyle</key>
            <string>manual</string>

            <key>teamID</key>
            <string>$TEAM_ID</string>

            <key>signingCertificate</key>
            <string>Apple Distribution</string>

            <key>provisioningProfiles</key>
            <dict>
              <key>net.tradeaura.app</key>
              <string>Aura App Store</string>
            </dict>
          </dict>
          </plist>
          EOF

          BUILD_NUMBER="${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM=YA5SH43A77 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Aura App Store" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            MARKETING_VERSION="1.0" \
            clean archive

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist exportOptions.plist

          echo "IPA_PATH=$(ls $EXPORT_PATH/*.ipa | head -n 1)" >> $GITHUB_ENV

      - name: Create App Store Connect API key file
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          echo "$APPSTORE_CONNECT_API_KEY_BASE64" | base64 --decode > key.p8

          python3 - <<'PY'
          import json, os
          key_id = os.environ["APPSTORE_CONNECT_KEY_ID"]
          issuer_id = os.environ["APPSTORE_CONNECT_ISSUER_ID"]
          with open("key.p8", "r", encoding="utf-8") as f:
              key = f.read()
          data = {"key_id": key_id, "issuer_id": issuer_id, "key": key, "in_house": False}
          with open("api_key.json", "w", encoding="utf-8") as f:
              json.dump(data, f)
          PY

          echo "ASC_API_KEY_PATH=api_key.json" >> $GITHUB_ENV

      - name: Sanity check IPA + API key file
        run: |
          set -e
          echo "ASC_API_KEY_PATH=$ASC_API_KEY_PATH"
          echo "IPA_PATH=$IPA_PATH"
          ls -lah "$ASC_API_KEY_PATH"
          ls -lah "$IPA_PATH"

      - name: Upload to TestFlight
        run: |
          set -e
          fastlane pilot upload \
            --api_key_path "$ASC_API_KEY_PATH" \
            -i "$IPA_PATH" \
            --skip_waiting_for_build_processing true