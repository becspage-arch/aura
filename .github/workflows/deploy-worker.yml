name: Deploy Worker to ECS

on:
  push:
    branches:
      - master
    paths:
      - "worker/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::074184607195:role/github-actions-deploy-role
          aws-region: eu-west-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image (sha + latest)
        run: |
          ECR=074184607195.dkr.ecr.eu-west-2.amazonaws.com
          REPO=aura-worker
          SHA_TAG=$ECR/$REPO:${{ github.sha }}
          LATEST_TAG=$ECR/$REPO:latest

          docker build -f worker/Dockerfile -t $SHA_TAG -t $LATEST_TAG .
          docker push $SHA_TAG
          docker push $LATEST_TAG

      - name: Register new task definition revision
        run: |
          ECR=074184607195.dkr.ecr.eu-west-2.amazonaws.com
          REPO=aura-worker
          IMAGE=$ECR/$REPO:${{ github.sha }}

          # Replace the full image string exactly (this must match your ecs-taskdef.json)
          sed "s|$ECR/$REPO:latest|$IMAGE|g" worker/ecs-taskdef.json > taskdef.json
          
          aws ecs register-task-definition --cli-input-json file://taskdef.json